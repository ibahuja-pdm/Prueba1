<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mantenimiento PDM</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --primary:        #004F9F;
    --primary-dark:  #003D7C;
    --primary-light: #E6F0F9;
    --success:       #00A859;
    --success-bg:    #E6F6EF;
    --warning:       #FFB800;
    --warning-bg:    #FFF8E6;
    --danger:        #D93025;
    --danger-bg:     #FCEAE9;
    --neutral:       #676879;
    --neutral-light: #C5C7D4;
    --bg:            #F9FAFB;
    --surface:       #FFFFFF;
    --border:        #E6E9EF;
    --text-primary:  #323338;
    --text-secondary:#676879;
    --text-muted:    #C5C7D4;
    --font:          'Inter', sans-serif;
    --radius:        12px;
    --shadow-sm:     0 1px 4px rgba(0,0,0,0.06);
    --shadow-hover:  0 8px 24px rgba(0,79,159,0.14);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); font-family: var(--font); color: var(--text-primary); min-height: 100vh; }

  /* ── TOPBAR ── */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
    box-shadow: var(--shadow-sm);
  }
  .topbar-inner {
    max-width: 1600px; margin: 0 auto; padding: 0 24px;
    height: 60px; display: flex; align-items: center; justify-content: space-between;
  }
  .topbar-brand { display: flex; align-items: center; gap: 10px; }
  .brand-icon {
    width: 34px; height: 34px; background: var(--primary);
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
    font-size: 17px; color: #fff;
  }
  .brand-name { font-size: 15px; font-weight: 700; }
  .brand-name span { color: var(--primary); }

  .sync-badge {
    display: flex; align-items: center; gap: 6px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 20px; padding: 5px 12px;
    font-size: 11px; font-weight: 500; color: var(--text-secondary);
  }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--success); animation: blink 2s infinite; }
  .sync-dot.error { background: var(--danger); animation: none; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── LAYOUT ── */
  .content { max-width: 1600px; margin: 0 auto; padding: 24px; }

  .tab-nav {
    display: flex; gap: 4px; margin-bottom: 24px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 4px; width: fit-content;
  }
  .tab-btn {
    display: flex; align-items: center; gap: 7px; padding: 8px 20px;
    border: none; background: transparent; cursor: pointer;
    font-size: 13px; font-weight: 600; color: var(--text-secondary);
    border-radius: 7px; transition: 0.18s;
  }
  .tab-btn.active { background: var(--primary); color: #fff; }

  .tab-pane { display: none; }
  .tab-pane.active { display: block; }

  /* ── GRID ── */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

  /* ── CARDS ── */
  .card {
    background: var(--surface); border-radius: var(--radius);
    border: 1px solid var(--border); padding: 18px 16px 15px;
    transition: 0.2s; box-shadow: var(--shadow-sm);
    position: relative; overflow: hidden; text-align: center;
  }
  .card::before { content: ''; position: absolute; top: 0; left: 0; bottom: 0; width: 4px; background: var(--primary); }
  .card.card-off::before   { background: var(--neutral-light); }
  .card.card-warn::before  { background: var(--warning); }
  .card.card-alarm::before { background: #FF8C00; }
  .card.card-fail::before  { background: var(--danger); }
  .card:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); }

  .card-header { display: flex; justify-content: space-between; align-items: flex-start; text-align: left; margin-bottom: 10px; }
  .card-title  { font-size: 14px; font-weight: 700; color: var(--text-primary); }
  .card-sub    { font-size: 11px; color: var(--text-secondary); }

  /* ── BADGES ── */
  .status-badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 9px; font-weight: 600; padding: 3px 8px; border-radius: 20px; white-space: nowrap;
  }
  .badge-operativo      { background: var(--success-bg); color: #007D43; }
  .badge-carga-parcial  { background: var(--warning-bg); color: #BF8900; }
  .badge-alarma-activa  { background: #FFF0E0;            color: #C05800; }
  .badge-falla-critica  { background: var(--danger-bg);  color: #B9251C; }
  .badge-fuera-servicio { background: #F1F3F6;            color: #676879; }
  .badge-standby        { background: #E6F0F9;            color: #004F9F; }

  /* ── GAUGE & KPI ── */
  .gauge-wrap { display: flex; justify-content: center; margin: 4px 0 0; }
  .gauge-wrap svg { max-width: 100%; height: auto; }
  .kpi-value { font-size: 28px; font-weight: 800; color: var(--primary); margin-top: -6px; margin-bottom: 12px; letter-spacing: -1px; }
  .kpi-off   { color: var(--text-muted); font-size: 22px; }

  /* ── METRICS ── */
  .metrics { border-top: 1px solid var(--border); padding-top: 12px; display: flex; flex-direction: column; gap: 8px; text-align: left; }
  .mrow    { display: flex; justify-content: space-between; align-items: center; }
  .mlabel  { font-size: 11px; font-weight: 500; color: var(--text-secondary); }
  .mval    { font-size: 12px; font-weight: 700; color: var(--text-primary); }

  .c-normal  { color: #007D43; }
  .c-warning { color: #BF8900; }
  .c-danger  { color: #B9251C; }
  .c-off     { color: var(--text-muted); }

  /* ── LOADING ── */
  .loading-state {
    grid-column: 1/-1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 260px; gap: 12px;
    color: var(--text-secondary); font-size: 13px; font-weight: 500;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border); border-top-color: var(--primary);
    border-radius: 50%; animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── RESPONSIVE MÓVIL ── */
  @media (max-width: 768px) {
    .tab-nav {
      position: sticky; top: 60px; z-index: 90;
      width: 100%; border-radius: 0;
      border-left: none; border-right: none; border-top: none;
      margin-bottom: 0; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .tab-btn { flex: 1; justify-content: center; padding: 10px 12px; font-size: 13px; }
    .content { padding: 0; }
    .tab-pane.active { padding: 16px; }
    .grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .card { padding: 12px 10px 10px; }
    .card-title { font-size: 12px; }
    .card-sub   { font-size: 10px; }
    .status-badge { font-size: 8px; padding: 2px 6px; }
    .kpi-value  { font-size: 20px; margin-top: -4px; margin-bottom: 8px; }
    .kpi-off    { font-size: 18px; }
    .mlabel     { font-size: 10px; }
    .mval       { font-size: 11px; }
    .metrics    { gap: 6px; }
  }
</style>
</head>

/* ══════════ GAUGE ══════════ */
const SVG_NS = 'http://www.w3.org/2000/svg';
const G = { CX:115, CY:85, R_OUTER:78, R_INNER:52, R_NEEDLE:70 };

function pt(val, r) {
  const rad = (180 - (Math.min(val,100)/100)*180) * Math.PI/180;
  return { x: G.CX + r*Math.cos(rad), y: G.CY - r*Math.sin(rad) };
}
function svgEl(tag, attrs) {
  const el = document.createElementNS(SVG_NS, tag);
  for (const [k,v] of Object.entries(attrs)) el.setAttribute(k,v);
  return el;
}
function buildGauge(svg, gradId, unit='%') {
  const { CX, CY, R_OUTER, R_INNER } = G;
  const defs = document.createElementNS(SVG_NS,'defs');
  const grad = svgEl('linearGradient',{ id:gradId, x1:'0%', y1:'0%', x2:'100%', y2:'0%' });
  [{ o:'0%', c:'#00A859' },{ o:'55%', c:'#FFB800' },{ o:'100%', c:'#D93025' }].forEach(s =>
    grad.appendChild(svgEl('stop',{ offset:s.o, 'stop-color':s.c }))
  );
  defs.appendChild(grad); svg.appendChild(defs);
  const o1=pt(0,R_OUTER), o2=pt(100,R_OUTER), i1=pt(0,R_INNER), i2=pt(100,R_INNER);
  const arcD = `M ${o1.x} ${o1.y} A ${R_OUTER} ${R_OUTER} 0 0 1 ${o2.x} ${o2.y} L ${i2.x} ${i2.y} A ${R_INNER} ${R_INNER} 0 0 0 ${i1.x} ${i1.y} Z`;
  svg.appendChild(svgEl('path',{ d:arcD, fill:'#F5F6FA', stroke:'#E6E9EF', 'stroke-width':'1' }));
  svg.appendChild(svgEl('path',{ d:arcD, fill:`url(#${gradId})`, opacity:'0.85' }));
  [0,25,50,75,100].forEach(v => {
    const p1=pt(v,R_OUTER+2), p2=pt(v,R_OUTER+8), pl=pt(v,R_OUTER+16);
    svg.appendChild(svgEl('line',{ x1:p1.x,y1:p1.y,x2:p2.x,y2:p2.y,stroke:'#C5C7D4','stroke-width':'1.5' }));
    const lbl = svgEl('text',{ x:pl.x,y:pl.y+4,'text-anchor':'middle','font-size':'8',fill:'#676879','font-family':'Inter','font-weight':'600' });
    lbl.textContent = v+unit; svg.appendChild(lbl);
  });
  const needle = svgEl('line',{ x1:CX,y1:CY,x2:CX-G.R_NEEDLE,y2:CY,stroke:'#323338','stroke-width':'2.5','stroke-linecap':'round' });
  svg.appendChild(needle);
  svg.appendChild(svgEl('circle',{ cx:CX,cy:CY,r:'9',fill:'#FFFFFF',stroke:'#E6E9EF','stroke-width':'2' }));
  svg.appendChild(svgEl('circle',{ cx:CX,cy:CY,r:'4',fill:'#004F9F' }));
  return needle;
}

/* Aguja para % */
function animateNeedle(needle, kpiEl, targetVal, isTemp=false, delay=0) {
  setTimeout(() => {
    const start = performance.now();
    function frame(now) {
      const t = Math.min((now-start)/1200, 1);
      const ease = 1 - Math.pow(1-t, 3);
      const cur = ease * targetVal;
      const p = pt(cur, G.R_NEEDLE);
      needle.setAttribute('x2', p.x); needle.setAttribute('y2', p.y);
      if (kpiEl) {
        kpiEl.textContent = Math.round(cur) + (isTemp ? ' °F' : ' %');
        kpiEl.style.color = cur > 85 ? '#D93025' : cur > 65 ? '#BF8900' : '#007D43';
      }
      if (t < 1) requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  }, delay);
}

/* Aguja para temperatura (escala relativa a maxTemp) */
function animateNeedleTemp(needle, kpiEl, targetTemp, maxTemp, delay=0) {
  const targetPct = Math.min((targetTemp / maxTemp) * 100, 100);
  setTimeout(() => {
    const start = performance.now();
    function frame(now) {
      const t = Math.min((now-start)/1200, 1);
      const ease = 1 - Math.pow(1-t, 3);
      const curPct  = ease * targetPct;
      const curTemp = Math.round(ease * targetTemp);
      const p = pt(curPct, G.R_NEEDLE);
      needle.setAttribute('x2', p.x); needle.setAttribute('y2', p.y);
      if (kpiEl) {
        kpiEl.textContent = curTemp + ' °F';
        kpiEl.style.color = curPct > 80 ? '#D93025' : curPct > 55 ? '#BF8900' : '#007D43';
      }
      if (t < 1) requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  }, delay);
}

/* ══════════ API MONDAY ══════════ */
async function fetchMondayAPI(query, attempt=1) {
  try {
    const res = await fetch('https://api.monday.com/v2', {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'Authorization':CONFIG.API_TOKEN, 'API-Version':'2023-10' },
      body: JSON.stringify({ query })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
    const data = await res.json();
    if (data.errors) throw new Error(data.errors.map(e=>e.message).join(', '));
    if (!data.data)  throw new Error('Respuesta inesperada de la API.');
    return data;
  } catch (err) {
    if (attempt < CONFIG.MAX_RETRIES) {
      await new Promise(r => setTimeout(r, CONFIG.RETRY_DELAY_MS));
      return fetchMondayAPI(query, attempt+1);
    }
    throw err;
  }
}

async function fetchAllItemsFromBoard(boardId) {
  const allItems = [];
  let cursor = null;
  do {
    const cursorArg = cursor ? `, cursor: "${cursor}"` : '';
    const query = `query {
      boards(ids: ${boardId}) {
        items_page(limit: 100${cursorArg}) {
          cursor
          items { id name created_at column_values { id text } }
        }
      }
    }`;
    const data = await fetchMondayAPI(query);
    const page = data.data.boards[0].items_page;
    allItems.push(...page.items);
    cursor = page.cursor || null;
  } while (cursor);
  return allItems;
}

/* ══════════ HELPERS ══════════ */
function parseStatus(raw='') {
  const s = (raw||'').toLowerCase().trim();
  if (s.includes('operativo'))     return 'operativo';
  if (s.includes('carga parcial')) return 'carga-parcial';
  if (s.includes('alarma'))        return 'alarma-activa';
  if (s.includes('falla'))         return 'falla-critica';
  if (s.includes('standby'))       return 'standby';
  return 'fuera-servicio';
}

const DASH = '—';
const STATUS_CARD = {
  'operativo':'', 'carga-parcial':'card-warn', 'alarma-activa':'card-alarm',
  'falla-critica':'card-fail', 'fuera-servicio':'card-off', 'standby':'card-off'
};
const STATUS_BADGE = {
  'operativo':'badge-operativo', 'carga-parcial':'badge-carga-parcial',
  'alarma-activa':'badge-alarma-activa', 'falla-critica':'badge-falla-critica',
  'fuera-servicio':'badge-fuera-servicio', 'standby':'badge-standby'
};
const STATUS_LABEL = {
  'operativo':'● Operativo', 'carga-parcial':'◐ Carga Parcial',
  'alarma-activa':'⚠ Alarma Activa', 'falla-critica':'✕ Falla Crítica',
  'fuera-servicio':'○ Fuera de Servicio', 'standby':'💤 Standby'
};

function colorClass(v) { return v > 80 ? 'c-danger' : v > 50 ? 'c-warning' : 'c-normal'; }
function tempClass(v)   { return v > 110 ? 'c-danger' : 'c-normal'; }
function mr(label, val, cls='') {
  return `<div class="mrow"><span class="mlabel">${label}</span><span class="mval ${cls}">${val}</span></div>`;
}

/* ══════════ RENDER CHILLERS ══════════ */
function renderChillerCard(ch, delay=0) {
  const off = ch.status === 'fuera-servicio' || ch.status === 'standby';
  const card = document.createElement('div');
  card.className = `card ${STATUS_CARD[ch.status]||''}`.trim();

  card.innerHTML = `
    <div class="card-header">
      <div><div class="card-title">${ch.name}</div><div class="card-sub">${ch.sub}</div></div>
      <span class="status-badge ${STATUS_BADGE[ch.status]||'badge-fuera-servicio'}">
        ${STATUS_LABEL[ch.status]||'○ Fuera de Servicio'}
      </span>
    </div>
    <div class="gauge-wrap">
      <svg id="svg-ch-${ch.id}" width="230" height="100" viewBox="0 0 230 100"></svg>
    </div>
    <div class="kpi-value ${off?'kpi-off':''}" id="kpi-ch-${ch.id}">${off ? DASH : '0 %'}</div>
    <div class="metrics">
      ${mr('Carga',      off?DASH:ch.carga+' %',    off?'c-off':colorClass(ch.carga))}
      ${mr('T° Salida',  off?DASH:ch.tempOut+' °F', off?'c-off':'c-normal')}
      ${mr('T° Entrada', off?DASH:ch.tempIn+' °F',  off?'c-off':'c-normal')}
      ${mr('P. Salida',  off?DASH:ch.presOut+' psi',off?'c-off':'c-warning')}
      ${mr('P. Entrada', off?DASH:ch.presIn+' psi', off?'c-off':'c-warning')}
    </div>`;

  document.getElementById('grid-chillers').appendChild(card);
  const needle = buildGauge(document.getElementById(`svg-ch-${ch.id}`), `grad-ch-${ch.id}`, '%');
  if (!off) animateNeedle(needle, document.getElementById(`kpi-ch-${ch.id}`), ch.carga, false, delay);
}

/* ══════════ RENDER COMPRESORES ══════════ */
function renderCompresorCard(cp, delay=0) {
  const off = cp.status === 'fuera-servicio' || cp.status === 'standby';
  const MAX_TEMP = 150;
  const card = document.createElement('div');
  card.className = `card ${STATUS_CARD[cp.status]||''}`.trim();

  card.innerHTML = `
    <div class="card-header">
      <div><div class="card-title">${cp.name}</div><div class="card-sub">${cp.sub}</div></div>
      <span class="status-badge ${STATUS_BADGE[cp.status]||'badge-fuera-servicio'}">
        ${STATUS_LABEL[cp.status]||'○ Fuera de Servicio'}
      </span>
    </div>
    <div class="gauge-wrap">
      <svg id="svg-cp-${cp.id}" width="230" height="100" viewBox="0 0 230 100"></svg>
    </div>
    <div class="kpi-value ${off?'kpi-off':''}" id="kpi-cp-${cp.id}">${off ? DASH : '0 °F'}</div>
    <div class="metrics">
      ${mr('T° Carga',    off?DASH:cp.tempCarga+' °F',    off?'c-off':tempClass(cp.tempCarga))}
      ${mr('T° Descarga', off?DASH:cp.tempDescarga+' °F', off?'c-off':tempClass(cp.tempDescarga))}
      ${mr('P. Carga',    off?DASH:cp.presCarga+' psi',   off?'c-off':'c-warning')}
      ${mr('P. Descarga', off?DASH:cp.presDescarga+' psi',off?'c-off':'c-warning')}
    </div>`;

  document.getElementById('grid-compresores').appendChild(card);
  const needle = buildGauge(document.getElementById(`svg-cp-${cp.id}`), `grad-cp-${cp.id}`, '°F');
  if (!off) animateNeedleTemp(needle, document.getElementById(`kpi-cp-${cp.id}`), cp.tempCarga, MAX_TEMP, delay);
}

/* ══════════ INIT ══════════ */
async function init() {
  const statusEl = document.getElementById('update-status');
  const dot      = document.getElementById('sync-dot');
  statusEl.textContent = 'Sincronizando...';
  dot.className = 'sync-dot';

  try {
    const [chillerItems, compresorItems] = await Promise.all([
      fetchAllItemsFromBoard(CONFIG.BOARD_CHILLERS),
      fetchAllItemsFromBoard(CONFIG.BOARD_COMPRESORES)
    ]);

    /* ── Chillers ── */
    const latestCH = new Map();
    chillerItems.forEach(item => {
      const name = item.name.trim().toUpperCase();
      if (!CONFIG.CHILLER_NAMES.includes(name)) return;
      if (!latestCH.has(name) || new Date(item.created_at) > new Date(latestCH.get(name).created_at))
        latestCH.set(name, item);
    });

    const gridCH = document.getElementById('grid-chillers');
    gridCH.innerHTML = '';
    CONFIG.CHILLER_NAMES.forEach((name, i) => {
      const item = latestCH.get(name); if (!item) return;
      const gv = id => parseFloat(item.column_values.find(c=>c.id===id)?.text?.replace(/[^\d.-]/g,'')) || 0;
      renderChillerCard({
        id: i, name, sub: CHILLER_SUB[name] || 'Equipo',
        carga:   gv(CONFIG.COL_CH.CARGA),
        tempOut: gv(CONFIG.COL_CH.TEMP_OUT),
        tempIn:  gv(CONFIG.COL_CH.TEMP_IN),
        presOut: gv(CONFIG.COL_CH.PRES_OUT),
        presIn:  gv(CONFIG.COL_CH.PRES_IN),
        status:  parseStatus(item.column_values.find(c=>c.id===CONFIG.COL_CH.STATUS)?.text)
      }, i * 80);
    });

    /* ── Compresores ── */
    const latestCP = new Map();
    compresorItems.forEach(item => {
      const name = item.name.trim().toUpperCase();
      if (!CONFIG.COMPRESOR_NAMES.includes(name)) return;
      if (!latestCP.has(name) || new Date(item.created_at) > new Date(latestCP.get(name).created_at))
        latestCP.set(name, item);
    });

    const gridCP = document.getElementById('grid-compresores');
    gridCP.innerHTML = '';
    CONFIG.COMPRESOR_NAMES.forEach((name, i) => {
      const item = latestCP.get(name); if (!item) return;
      const gv = id => parseFloat(item.column_values.find(c=>c.id===id)?.text?.replace(/[^\d.-]/g,'')) || 0;
      renderCompresorCard({
        id: 'cp' + i, name, sub: COMPRESOR_SUB[name] || 'Equipo',
        tempCarga:    gv(CONFIG.COL_CP.TEMP_CARGA),
        tempDescarga: gv(CONFIG.COL_CP.TEMP_DESCARGA),
        presCarga:    gv(CONFIG.COL_CP.PRES_CARGA),
        presDescarga: gv(CONFIG.COL_CP.PRES_DESCARGA),
        status:       parseStatus(item.column_values.find(c=>c.id===CONFIG.COL_CP.STATUS)?.text)
      }, i * 80);
    });

    const now = new Date();
    const pad = n => String(n).padStart(2,'0');
    statusEl.textContent = `${pad(now.getDate())}/${pad(now.getMonth()+1)}/${now.getFullYear()} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
    dot.className = 'sync-dot';

  } catch (err) {
    console.error(err);
    statusEl.textContent = 'Error de conexión';
    dot.className = 'sync-dot error';
  }
}

/* ── Tabs ── */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.tab-btn, .tab-pane').forEach(el => el.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`pane-${btn.dataset.tab}`).classList.add('active');
  };
});

init();
setInterval(init, CONFIG.REFRESH_MS);
</script>
</body>
</html>
